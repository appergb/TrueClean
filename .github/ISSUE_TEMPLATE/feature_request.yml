name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你希望 TrueClean 新增或改进的功能。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么问题？或你遇到了什么不便？
      placeholder: "例如：无法按文件修改时间筛选大文件。"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望应用如何解决？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他相关截图、链接或上下文。
