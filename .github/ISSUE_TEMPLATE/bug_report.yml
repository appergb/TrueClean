name: Bug Report
description: Report a bug to help us improve TrueClean
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你抽出时间报告 Bug！请尽量填写以下信息，以便我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰地描述这个 Bug 是什么。
      placeholder: "例如：扫描大目录时应用崩溃。"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 详细的重现步骤。
      placeholder: |
        1. 打开应用
        2. 点击「扫描」
        3. 选择目录 /Users/...
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 在「设置」中查看版本号。
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 相关的错误日志或截图（拖拽上传）。
      render: shell
