name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# tauri-action 需要写权限来创建 Release 和上传资源
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14   # Apple Silicon (arm64) → aarch64 .dmg
          - platform: macos-13   # Intel (x86_64) → x64 .dmg
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Build, sign, and publish with tauri-action ─────────────────
      # The action builds platform installers (.dmg/.app, .msi/.exe,
      # .AppImage/.deb), signs updater bundles, generates latest.json,
      # and uploads everything to the GitHub Release.
      #
      # macOS: 未配置 Apple 开发者证书，做未签名构建。用户首次打开 .dmg
      # 后需右键 → 打开（或 System Settings → Privacy & Security → 仍要打开）。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Updater signing (cross-platform) ──
          # Signs the update bundles so the in-app updater can verify them.
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TrueClean ${{ github.ref_name }}"
          releaseBody: |
            ## TrueClean ${{ github.ref_name }}

            Cross-platform disk cleaner with an AI agent.

            ### Downloads
            - **macOS**: `.dmg` (Apple Silicon `aarch64` + Intel `x64`)
              - 未签名构建。首次打开：右键 .app →「打开」→ 确认。
              - Unsigned build. First launch: right-click .app → "Open" → confirm.
            - **Windows**: `.msi` / `.exe`
            - **Linux**: `.AppImage` / `.deb`

            The app will auto-update to the latest version using the
            built-in updater (signed updates verified against the
            embedded public key).
          releaseDraft: true
          prerelease: false
